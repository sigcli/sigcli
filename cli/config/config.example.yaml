# SigCLI unified configuration
# Copy this to ~/.sig/config.yaml and customize for your services.
#
# All configuration lives in this single file — no env vars, no cascade.

# Mode: "browser" (default) or "browserless" (remote/headless machines)
# Use "sig init --remote" to set up browserless mode.
mode: browser

# Browser settings (required)
browser:
    browserDataDir: ~/.sig/browser-data # Persistent browser profile directory
    # execPath: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
    headlessTimeout: 20000 # Timeout for headless auth attempt (ms)
    visibleTimeout: 120000 # Timeout for visible/user-assisted auth (ms)

# Storage settings (required)
storage:
    credentialsDir: ~/.sig/credentials # Per-provider credential files directory

# Remote credential stores (optional)
# remotes:
#   dev-server:
#     type: ssh
#     host: dev.example.com
#     user: deploy
#     path: ~/.sig
#     sshKey: ~/.ssh/id_ed25519

# Watch — auto-refresh credentials on a schedule.
# Managed by "sig watch add/remove/set-interval", but you can edit directly.
# watch:
#   interval: "5m"
#   providers:
#     my-jira:
#       autoSync:
#         - dev-server
#     my-wiki:                           # watch + refresh only, no auto-sync

# ============================================================================
# Providers
# ============================================================================
#
# Most providers are auto-provisioned by "sig login <url>" — no config needed.
# Add entries here for custom extract/apply rules or fine-tuning.
#
# Every provider has:
#   strategy: browser | prompt
#   extract[]: { from, as, match } — what to capture from the browser
#   apply[]:   { in, name, value } — how to inject into HTTP requests
#
# Optional fields:
#   validateUrl     — protected endpoint to verify credentials (2xx = valid, 401/403 = invalid)
#   loginMode       — login cascade mode: auto (default) | headless | visible
#   ttl             — credential lifetime (e.g. "12h", "7d")
#   loginUrlPatterns — URL substrings that indicate a login page (e.g. /login, /auth/sso)
#   networkProxy    — SOCKS proxy for browser (e.g. socks5://127.0.0.1:3333)

providers:
    # ---------------------------------------------------------------------------
    # Simplest case: cookie-based SSO (auto-provisioned default)
    # SSO sites work with zero config — redirect detection is automatic.
    # ---------------------------------------------------------------------------
    # my-jira:
    #   domains:
    #     - jira.example.com
    #   entryUrl: https://jira.example.com/
    #   strategy: browser
    #   ttl: "10d"
    #   extract:
    #     - from: cookies
    #       as: cookie
    #       match: "*"
    #   apply:
    #     - in: header
    #       name: Cookie
    #       value: "${cookie}"

    # ---------------------------------------------------------------------------
    # Public site with validateUrl
    # Public sites set tracking cookies to all visitors. validateUrl lets sig
    # distinguish auth cookies from anonymous ones (2xx = logged in).
    # ---------------------------------------------------------------------------
    # reddit:
    #   domains:
    #     - www.reddit.com
    #     - reddit.com
    #   entryUrl: https://www.reddit.com/
    #   validateUrl: https://www.reddit.com/prefs/friends
    #   strategy: browser
    #   ttl: "2h"
    #   extract:
    #     - from: cookies
    #       as: cookie
    #       match: "*"
    #   apply:
    #     - in: header
    #       name: Cookie
    #       value: "${cookie}"

    # ---------------------------------------------------------------------------
    # Cookies + localStorage (e.g. Slack xoxc token)
    # ---------------------------------------------------------------------------
    # app-slack:
    #   domains:
    #     - app.slack.com
    #     - edgeapi.slack.com
    #   entryUrl: https://app.slack.com/client/<TEAM_ID>
    #   strategy: browser
    #   ttl: "7d"
    #   extract:
    #     - from: cookies
    #       as: cookie
    #       match: "*"
    #     - from: localStorage
    #       as: xoxc-token
    #       match: "localConfig_v2"
    #       jsonPath: "teams.<TEAM_ID>.token"
    #   apply:
    #     - in: header
    #       name: Cookie
    #       value: "${cookie}"
    #     - in: header
    #       name: Authorization
    #       value: "Bearer ${xoxc-token}"

    # ---------------------------------------------------------------------------
    # OAuth2 via localStorage (e.g. Microsoft Teams)
    # ---------------------------------------------------------------------------
    # ms-teams:
    #   name: Microsoft Teams
    #   domains:
    #     - teams.cloud.microsoft
    #   entryUrl: https://teams.cloud.microsoft/v2/
    #   strategy: browser
    #   ttl: "2h"
    #   extract:
    #     - from: localStorage
    #       as: access_token
    #       match: "*|accesstoken|*ic3.teams.office.com*"
    #       jsonPath: "secret"
    #       expiresJsonPath: "expiresOn"
    #   apply:
    #     - in: header
    #       name: Authorization
    #       value: "Bearer ${access_token}"

    # ---------------------------------------------------------------------------
    # Forced visible mode (e.g. site that blocks headless)
    # ---------------------------------------------------------------------------
    # grafana:
    #   domains:
    #     - grafana.example.com
    #   entryUrl: https://grafana.example.com/
    #   loginMode: visible
    #   strategy: browser
    #   ttl: "2h"
    #   extract:
    #     - from: cookies
    #       as: cookie
    #       match: "*"
    #   apply:
    #     - in: header
    #       name: Cookie
    #       value: "${cookie}"

    # ---------------------------------------------------------------------------
    # Prompt strategy (no browser — manual token input)
    # ---------------------------------------------------------------------------
    # github:
    #   name: GitHub
    #   domains:
    #     - github.com
    #     - api.github.com
    #   entryUrl: https://github.com/settings/tokens
    #   strategy: prompt
    #   extract:
    #     - from: prompt
    #       as: token
    #       match: "Enter your GitHub personal access token"
    #   apply:
    #     - in: header
    #       name: Authorization
    #       value: "Bearer ${token}"
