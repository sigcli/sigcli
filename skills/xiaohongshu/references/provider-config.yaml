# sigcli provider config for Xiaohongshu (Little Red Book)
# Add to ~/.sig/config.yaml under `providers:`
#
# Prerequisites:
#   npm install -g @sigcli/cli
#   sig init
#
# Login:
#   sig login xiaohongshu

xiaohongshu:
    domains:
        - www.xiaohongshu.com
        - edith.xiaohongshu.com
    entryUrl: https://www.xiaohongshu.com/explore
    validateUrl: https://www.xiaohongshu.com/notifications
    strategy: browser
    ttl: 2h
    extract:
        - from: cookies
          as: cookie
          match: '*'
        - from: cookies
          as: a1
          match: 'a1'
        - from: cookies
          as: web_session
          match: 'web_session'
        - from: cookies
          as: webId
          match: 'webId'
        - from: localStorage
          as: b1
          match: 'b1'
    apply:
        - in: header
          name: Cookie
          value: ${cookie}
