name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    lint:
        name: Lint & Format
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check formatting
              run: pnpm format:check

            - name: Lint
              run: pnpm lint

    ci:
        name: CI (Node ${{ matrix.node-version }})
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [18, 20, 22]
            fail-fast: false

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check (CLI)
              run: pnpm --filter @sigcli/cli exec tsc --noEmit

            - name: Type check (SDK)
              run: pnpm --filter @sigcli/sdk exec tsc --noEmit

            - name: Build (CLI + SDK)
              run: pnpm --filter @sigcli/cli --filter @sigcli/sdk build

            - name: Test (CLI + SDK)
              run: pnpm --filter @sigcli/cli --filter @sigcli/sdk test

    website:
        name: Website
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Check for website changes
              id: changes
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    BASE=${{ github.event.pull_request.base.sha }}
                    HEAD=${{ github.event.pull_request.head.sha }}
                  else
                    BASE=${{ github.event.before }}
                    HEAD=${{ github.sha }}
                  fi
                  if git diff --name-only "$BASE" "$HEAD" | grep -qE '^website/'; then
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Install pnpm
              if: steps.changes.outputs.changed == 'true'
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              if: steps.changes.outputs.changed == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              if: steps.changes.outputs.changed == 'true'
              run: pnpm install --frozen-lockfile

            - name: Build
              if: steps.changes.outputs.changed == 'true'
              run: pnpm --filter website build

            - name: Skip (no website changes)
              if: steps.changes.outputs.changed == 'false'
              run: echo "No website changes detected, skipping build."
