# Sigcli configuration template for skills
# Copy to ~/.sig/config.yaml and replace <...> placeholders with your values.
#
# Docs: https://sigcli.ai

version: 2

mode: browser

browser:
    browserDataDir: ~/.sig/browser-data
    execPath: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
    headlessTimeout: 30000
    visibleTimeout: 120000
    waitUntil: load

storage:
    credentialsDir: ~/.sig/credentials

providers:
    # ── Microsoft Teams Chat API ────────────────────────────────────────────
    # OAuth2 bearer token extracted from MSAL localStorage.
    # Env var: SIG_MS_TEAMS_ACCESS_TOKEN
    ms-teams:
        name: Microsoft Teams
        domains: ['teams.cloud.microsoft']
        entryUrl: https://teams.cloud.microsoft/v2/
        strategy: browser
        ttl: '2h'
        required:
            - access_token
        extract:
            - from: localStorage
              as: access_token
              match: '*|accesstoken|*ic3.teams.office.com*'
              jsonPath: secret
              expiresJsonPath: expiresOn
        apply:
            - in: header
              name: Authorization
              value: 'Bearer ${access_token}'

    # ── Microsoft Graph API (Outlook + Teams people search) ─────────────────
    # Same login page as ms-teams, different audience token.
    # Env var: SIG_MS_GRAPH_ACCESS_TOKEN
    ms-graph:
        name: Microsoft Graph
        domains: ['graph.microsoft.com']
        entryUrl: https://teams.cloud.microsoft/v2/
        strategy: browser
        ttl: '2h'
        required:
            - access_token
        extract:
            - from: localStorage
              as: access_token
              match: '*|accesstoken|*graph.microsoft.com*'
              jsonPath: secret
              expiresJsonPath: expiresOn
        apply:
            - in: header
              name: Authorization
              value: 'Bearer ${access_token}'

    # ── Slack ───────────────────────────────────────────────────────────────
    # Cookie (xoxd) + localStorage (xoxc token).
    #
    # IMPORTANT: entryUrl must point to a specific workspace (/client/<TEAM_ID>),
    # NOT the root URL. The root URL shows a workspace picker where localStorage
    # is not yet populated.
    #
    # To find your Team ID: open Slack in a browser → the URL looks like
    #   https://app.slack.com/client/<TEAM_ID>/...
    # Enterprise Grid orgs start with "E", regular workspaces start with "T".
    #
    # Env vars: SIG_APP_SLACK_SESSION, SIG_APP_SLACK_XOXC_TOKEN
    app-slack:
        name: Slack
        domains: ['<your-workspace>.slack.com']
        entryUrl: https://app.slack.com/client/<your-team-id>
        strategy: browser
        ttl: '7d'
        required:
            - session.d
            - xoxc-token
        extract:
            - from: cookies
              as: session
              match: '*'
            - from: localStorage
              as: xoxc-token
              match: 'localConfig_v2'
              jsonPath: 'teams.<your-team-id>.token'
        apply:
            - in: header
              name: Cookie
              value: '${session}'
            - in: header
              name: Authorization
              value: 'Bearer ${xoxc-token}'

# ── Optional: auto-refresh credentials before they expire ─────────────────
# Managed by: sig watch add/remove/set-interval
# watch:
#   interval: "5m"
#   providers:
#     ms-teams:
#     ms-graph:

# ── Optional: remote credential sync via SSH ──────────────────────────────
# remotes:
#   dev-server:
#     type: ssh
#     host: dev.example.com
#     user: deploy
#     path: ~/.sig
#     sshKey: ~/.ssh/id_ed25519
