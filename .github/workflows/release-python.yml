name: Release Python SDK

on:
    workflow_dispatch:
        inputs:
            release_type:
                description: Release type
                required: true
                type: choice
                options:
                    - beta
                    - stable
                default: beta

jobs:
    release:
        name: Release sigcli-sdk (${{ inputs.release_type }})
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'

        permissions:
            contents: write
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup Python 3.12
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
              with:
                  python-version: '3.12'

            - name: Install dependencies
              working-directory: sdk/python
              run: |
                  pip install --upgrade pip
                  pip install build twine
                  pip install -e ".[dev]"

            - name: Run tests
              working-directory: sdk/python
              run: pytest

            - name: Type check
              working-directory: sdk/python
              run: mypy src/

            - name: Publish beta
              if: inputs.release_type == 'beta'
              working-directory: sdk/python
              env:
                  TWINE_USERNAME: __token__
                  TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
              run: |
                  BASE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
                  NEXT_BETA=$(python -c "
                  import subprocess
                  try:
                      out = subprocess.check_output(['pip', 'index', 'versions', 'sigcli-sdk'], stderr=subprocess.DEVNULL, text=True)
                      versions = [l.strip() for l in out.split(',')]
                      base = '${BASE_VERSION}'.split('-')[0]
                      betas = [int(v.split('b')[-1]) for v in versions if base in v and 'b' in v]
                      print(max(betas) + 1 if betas else 0)
                  except:
                      print(0)
                  ")
                  BETA_VERSION="${BASE_VERSION%.dev*}b${NEXT_BETA}"
                  sed -i "s/version = \".*\"/version = \"${BETA_VERSION}\"/" pyproject.toml
                  python -m build
                  twine upload dist/*
                  echo "## Published \`sigcli-sdk@${BETA_VERSION}\` (beta)" >> "$GITHUB_STEP_SUMMARY"

            - name: Publish stable
              if: inputs.release_type == 'stable'
              working-directory: sdk/python
              env:
                  TWINE_USERNAME: __token__
                  TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
                  if echo "$VERSION" | grep -qE '(dev|beta|alpha|rc)'; then
                    echo "::error::Version ${VERSION} contains a pre-release suffix."
                    exit 1
                  fi
                  python -m build
                  twine upload dist/*
                  TAG="sigcli-sdk-v${VERSION}"
                  gh release create "${TAG}" \
                    --title "sigcli-sdk@${VERSION}" \
                    --generate-notes
                  echo "## Published \`sigcli-sdk@${VERSION}\` (stable)" >> "$GITHUB_STEP_SUMMARY"
