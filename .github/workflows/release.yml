name: Release

on:
    workflow_dispatch:
        inputs:
            package:
                description: Package to release
                required: true
                type: choice
                options:
                    - '@sigcli/cli'
                    - '@sigcli/sdk'
            release_type:
                description: Release type
                required: true
                type: choice
                options:
                    - beta
                    - stable
                default: beta

jobs:
    release:
        name: Release ${{ inputs.package }} (${{ inputs.release_type }})
        runs-on: ubuntu-latest

        if: github.ref == 'refs/heads/main'

        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Resolve package directory
              id: pkg
              run: |
                  if [ "${{ inputs.package }}" = "@sigcli/cli" ]; then
                    echo "dir=cli" >> "$GITHUB_OUTPUT"
                  elif [ "${{ inputs.package }}" = "@sigcli/sdk" ]; then
                    echo "dir=sdk/typescript" >> "$GITHUB_OUTPUT"
                  fi

            - name: Type check
              run: pnpm --filter '${{ inputs.package }}' exec tsc --noEmit

            - name: Build
              run: pnpm --filter '${{ inputs.package }}' build

            - name: Run tests
              run: pnpm --filter '${{ inputs.package }}' test

            - name: Publish beta
              if: inputs.release_type == 'beta'
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              working-directory: ${{ steps.pkg.outputs.dir }}
              run: |
                  PKG_NAME="${{ inputs.package }}"
                  BASE_VERSION=$(node -p "require('./package.json').version")

                  NEXT_BETA=$(node -e "
                    const { execSync } = require('child_process');
                    let versions = [];
                    try {
                      const out = execSync('npm view ${PKG_NAME} versions --json', { encoding: 'utf8' });
                      const parsed = JSON.parse(out);
                      versions = Array.isArray(parsed) ? parsed : [parsed];
                    } catch {}
                    const base = '${BASE_VERSION}'.replace(/-.*/, '');
                    const betas = versions
                      .filter(v => v.startsWith(base + '-beta.'))
                      .map(v => parseInt(v.split('-beta.')[1], 10))
                      .filter(n => !isNaN(n));
                    console.log(betas.length ? Math.max(...betas) + 1 : 0);
                  ")

                  BETA_VERSION="${BASE_VERSION%-*}-beta.${NEXT_BETA}"
                  npm version "${BETA_VERSION}" --no-git-tag-version
                  npm publish --tag beta
                  echo "## Published \`${PKG_NAME}@${BETA_VERSION}\` (beta)" >> "$GITHUB_STEP_SUMMARY"

            - name: Publish stable
              if: inputs.release_type == 'stable'
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  GH_TOKEN: ${{ github.token }}
              working-directory: ${{ steps.pkg.outputs.dir }}
              run: |
                  PKG_NAME="${{ inputs.package }}"
                  VERSION=$(node -p "require('./package.json').version")

                  if echo "$VERSION" | grep -qE '[-]'; then
                    echo "::error::Version ${VERSION} contains a pre-release suffix. Update package.json to a stable version before publishing."
                    exit 1
                  fi

                  if npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null; then
                    echo "::error::Version ${VERSION} is already published to npm."
                    exit 1
                  fi

                  npm publish

                  TAG="${PKG_NAME//\//-}-v${VERSION}"
                  gh release create "${TAG}" \
                    --title "${PKG_NAME}@${VERSION}" \
                    --generate-notes

                  echo "## Published \`${PKG_NAME}@${VERSION}\` (stable)" >> "$GITHUB_STEP_SUMMARY"
