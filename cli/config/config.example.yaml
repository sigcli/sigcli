# SigCLI unified configuration
# Copy this to ~/.sig/config.yaml and customize for your services.
#
# All configuration lives in this single file — no env vars, no cascade.

# Mode: "browser" (default) or "browserless" (remote/headless machines)
# Use "sig init --remote" to set up browserless mode.
mode: browser

# Browser settings (required)
browser:
    browserDataDir: ~/.sig/browser-data # Persistent browser profile directory
    channel: chrome # Browser channel (chrome, msedge, chromium)
    # execPath: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
    headlessTimeout: 30000 # Timeout for headless auth attempt (ms)
    visibleTimeout: 120000 # Timeout for visible/user-assisted auth (ms)
    waitUntil: load # Page load condition (load, networkidle, domcontentloaded, commit)

# Storage settings (required)
storage:
    credentialsDir: ~/.sig/credentials # Per-provider credential files directory

# Remote credential stores (optional)
# remotes:
#   dev-server:
#     type: ssh
#     host: dev.example.com
#     user: deploy
#     path: ~/.sig
#     sshKey: ~/.ssh/id_ed25519

# Watch — auto-refresh credentials on a schedule.
# Managed by "sig watch add/remove/set-interval", but you can edit directly.
# watch:
#   interval: "5m"
#   providers:
#     my-jira:
#       autoSync:
#         - dev-server
#     my-wiki:                           # watch + refresh only, no auto-sync

# ============================================================================
# Providers
# ============================================================================
#
# Most providers are auto-provisioned by "sig login <url>" — no config needed.
# Add entries here for custom extract/apply rules or fine-tuning.
#
# Every provider has:
#   strategy: browser | prompt
#   extract[]: { from, as, match } — what to capture from the browser
#   apply[]:   { in, name, value } — how to inject into HTTP requests
#
# Optional fields:
#   ttl             — credential lifetime (e.g. "12h", "7d")
#   required[]      — completion criteria in "name.field" format
#   cookiePaths     — extra URL paths to query cookies from
#   waitUntil       — page load condition override (load|networkidle|domcontentloaded|commit)
#   loginUrlPatterns — URL substrings that indicate a login page (e.g. /login, /auth/sso)
#   networkProxy    — SOCKS proxy for browser (e.g. socks5h://127.0.0.1:1080)

providers:
    # ---------------------------------------------------------------------------
    # Simplest case: cookie-based SSO (auto-provisioned default)
    # ---------------------------------------------------------------------------
    # my-jira:
    #   domains:
    #     - jira.example.com
    #   entryUrl: https://jira.example.com/
    #   strategy: browser
    #   ttl: "10d"
    #   extract:
    #     - from: cookies
    #       as: session
    #       match: "*"
    #   apply:
    #     - in: header
    #       name: Cookie
    #       value: "${session}"

    # ---------------------------------------------------------------------------
    # Cookie path scoping (e.g. Confluence sets cookies on /wiki)
    # ---------------------------------------------------------------------------
    # my-wiki:
    #   domains:
    #     - wiki.example.com
    #   entryUrl: https://wiki.example.com/
    #   strategy: browser
    #   ttl: "12h"
    #   cookiePaths:
    #     - /wiki
    #   extract:
    #     - from: cookies
    #       as: session
    #       match: "*"
    #   apply:
    #     - in: header
    #       name: Cookie
    #       value: "${session}"

    # ---------------------------------------------------------------------------
    # Required cookies — wait for specific cookies before auth is complete
    # ---------------------------------------------------------------------------
    # reddit:
    #   domains:
    #     - www.reddit.com
    #     - reddit.com
    #   entryUrl: https://www.reddit.com/login
    #   strategy: browser
    #   ttl: "7d"
    #   networkProxy: socks5h://127.0.0.1:1080
    #   required:
    #     - session.reddit_session
    #     - session.token_v2
    #   extract:
    #     - from: cookies
    #       as: session
    #       match: "*"
    #   apply:
    #     - in: header
    #       name: Cookie
    #       value: "${session}"

    # ---------------------------------------------------------------------------
    # Cookies + localStorage (e.g. Slack xoxc token)
    # ---------------------------------------------------------------------------
    # app-slack:
    #   domains:
    #     - app.slack.com
    #     - edgeapi.slack.com
    #   entryUrl: https://app.slack.com/client/<TEAM_ID>
    #   strategy: browser
    #   ttl: "7d"
    #   required:
    #     - session.d
    #     - xoxc-token
    #   extract:
    #     - from: cookies
    #       as: session
    #       match: "*"
