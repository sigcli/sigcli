name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    lint:
        name: Lint & Format
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Install pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check formatting
              run: pnpm format:check

            - name: Lint
              run: pnpm lint

    ci:
        name: CI (Node ${{ matrix.node-version }})
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20, 22]
            fail-fast: false

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Install pnpm
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check (CLI)
              run: pnpm --filter @sigcli/cli exec tsc --noEmit

            - name: Type check (SDK)
              run: pnpm --filter @sigcli/sdk exec tsc --noEmit

            - name: Build (CLI + SDK)
              run: pnpm --filter @sigcli/cli --filter @sigcli/sdk build

            - name: Test (CLI + SDK)
              run: pnpm --filter @sigcli/cli --filter @sigcli/sdk test

    skills:
        name: Skills Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Setup Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
              with:
                  python-version: '3.12'

            - name: Install dependencies
              run: |
                  pip install pytest responses ruff
                  find skills -name requirements.txt -exec pip install -r {} \;

            - name: Lint (ruff)
              run: pip install ruff && cd skills && ruff check .

            - name: Test
              run: cd skills && python -m pytest -v --tb=short

    website:
        name: Website
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  fetch-depth: 0

            - name: Check for website changes
              id: changes
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    BASE=${{ github.event.pull_request.base.sha }}
                    HEAD=${{ github.event.pull_request.head.sha }}
                  else
                    BASE=${{ github.event.before }}
                    HEAD=${{ github.sha }}
                  fi
                  if git diff --name-only "$BASE" "$HEAD" | grep -qE '^website/'; then
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Install pnpm
              if: steps.changes.outputs.changed == 'true'
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

            - name: Setup Node.js
              if: steps.changes.outputs.changed == 'true'
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              if: steps.changes.outputs.changed == 'true'
              run: pnpm install --frozen-lockfile

            - name: Build
              if: steps.changes.outputs.changed == 'true'
              run: pnpm --filter website build

            - name: Skip (no website changes)
              if: steps.changes.outputs.changed == 'false'
              run: echo "No website changes detected, skipping build."
