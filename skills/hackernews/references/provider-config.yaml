# sigcli provider config for Hacker News
# Add to ~/.sig/config.yaml under `providers:`
#
# Prerequisites:
#   npm install -g @sigcli/cli
#   sig init
#
# Login:
#   sig login hackernews

hackernews:
    domains:
        - news.ycombinator.com
    entryUrl: https://news.ycombinator.com/
    strategy: browser
    ttl: 2h
    extract:
        - from: cookies
          as: cookie
          match: '*'
    apply:
        - in: header
          name: Cookie
          value: ${cookie}
