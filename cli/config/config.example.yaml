    #       as: xoxc-token
    #       match: "localConfig_v2"
    #       jsonPath: "teams.<TEAM_ID>.token"
    #   apply:
    #     - in: header
    #       name: Cookie
    #       value: "${session}"
    #     - in: header
    #       name: Authorization
    #       value: "Bearer ${xoxc-token}"

    # ---------------------------------------------------------------------------
    # OAuth2 via localStorage (e.g. Microsoft Teams)
    # ---------------------------------------------------------------------------
    # ms-teams:
    #   name: Microsoft Teams
    #   domains:
    #     - teams.cloud.microsoft
    #   entryUrl: https://teams.cloud.microsoft/v2/
    #   strategy: browser
    #   required:
    #     - access_token
    #   extract:
    #     - from: localStorage
    #       as: access_token
    #       match: "msal.*.accesstoken.*"
    #       jsonPath: "secret"
    #   apply:
    #     - in: header
    #       name: Authorization
    #       value: "Bearer ${access_token}"

    # ---------------------------------------------------------------------------
    # Multiple apply rules (e.g. Graph API with same login page)
    # ---------------------------------------------------------------------------
    # ms-graph:
    #   name: Microsoft Graph
    #   domains:
    #     - graph.microsoft.com
    #   entryUrl: https://teams.cloud.microsoft/v2/
    #   strategy: browser
    #   required:
    #     - access_token
    #   extract:
    #     - from: localStorage
    #       as: access_token
    #       match: "msal.*.accesstoken.*"
    #       jsonPath: "secret"
    #   apply:
    #     - in: header
    #       name: Authorization
    #       value: "Bearer ${access_token}"

    # ---------------------------------------------------------------------------
    # Prompt strategy (no browser — manual token input)
    # ---------------------------------------------------------------------------
    # github:
    #   name: GitHub
    #   domains:
    #     - github.com
    #     - api.github.com
    #   entryUrl: https://github.com/settings/tokens
