# sigcli provider config for X (Twitter)
# Add to ~/.sig/config.yaml under `providers:`
#
# Prerequisites:
#   npm install -g @sigcli/cli
#   sig init
#
# Login:
#   sig login x

x:
    domains:
        - x.com
    entryUrl: https://x.com/home
    validateUrl: https://x.com/settings
    strategy: browser
    ttl: 2h
    extract:
        - from: cookies
          as: cookie
          match: '*'
    apply:
        - in: header
          name: Cookie
          value: ${cookie}
