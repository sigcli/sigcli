# SigCLI unified configuration
# Copy this to ~/.sig/config.yaml and customize for your services.
#
# Project-level overrides: run "sig init --local" to create .sig/config.yaml
# in a project directory. Only the "providers" section is supported there.
# Project providers override global providers with the same ID.

# Mode: "browser" (default) or "browserless" (remote/headless machines)
# Use "sig init --remote" to set up browserless mode.
mode: browser

# Browser settings (required)
browser:
    browserDataDir: ~/.sig/browser-data # Persistent browser profile directory
    channel: chrome # Browser channel (chrome, msedge, chromium)
    # execPath: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome  # Native browser path for CDP mode (auto-detected if not set)
    headlessTimeout: 10000 # Timeout for headless auth attempt (ms)
    visibleTimeout: 120000 # Timeout for visible/user-assisted auth (ms)
    waitUntil: load # Default page load condition (load, networkidle, domcontentloaded, commit)

# Storage settings (required)
storage:
    credentialsDir: ~/.sig/credentials # Per-provider credential files directory

# Remote credential stores (optional)
# remotes:
#   dev-server:
#     type: ssh
#     host: dev.example.com
#     user: deploy
#     path: ~/.sig
#     sshKey: ~/.ssh/id_ed25519

# Watch — auto-refresh credentials on a schedule.
# Managed by "sig watch add/remove/set-interval", but you can edit directly.
# watch:
#   interval: "5m"
#   providers:
#     jira:
#       autoSync:
#         - dev-server
#     wiki:                                  # watch + refresh only, no auto-sync

# Provider configurations
# Cookie-based providers (most SSO systems) don't need config at all —
# just call `sig login https://jira.example.com` and it auto-provisions.
# Only create entries here for OAuth2, API tokens, or advanced settings.
providers:
    # Cookie-based authentication — only needed for custom TTL or options
    # (otherwise, auto-provisioning handles it)
    # my-jira:
    #   domains: ["jira.example.com"]
    #   strategy: cookie
    #   config:
    #     ttl: "12h"
    #   networkProxy: socks5://127.0.0.1:1080  # route browser through a SOCKS5 proxy

    # Cookie auth with path-scoped cookies (e.g. Confluence sets cookies on /wiki)
    # my-wiki:
    #   name: My Wiki
    #   domains: ["wiki.example.com"]
    #   entryUrl: https://wiki.example.com/wiki/display/Home
    #   strategy: cookie
    #   config:
    #     ttl: "12h"
    #     requiredCookies: ["seraph.confluence"]
    #     cookiePaths: ["/wiki"]             # query cookies at /wiki path too

    # OAuth2 with refresh tokens
    # azure-graph:
    #   name: Microsoft Graph
    #   domains: ["graph.microsoft.com"]
    #   entryUrl: https://login.microsoftonline.com/
    #   strategy: oauth2
    #   config:
    #     tokenEndpoint: https://login.microsoftonline.com/common/oauth2/v2.0/token
    #     clientId: your-app-id
    #     scopes: ["openid", "profile", "User.Read"]

    # Static API token (no browser needed)
    # github:
    #   name: GitHub
    #   domains: ["github.com", "api.github.com"]
    #   strategy: api-token
    #   config:
    #     headerName: Authorization
    #     headerPrefix: Bearer
    #     setupInstructions: |
    #       Create a Personal Access Token at:
    #       https://github.com/settings/tokens

    # Microsoft Teams — requires TWO providers (one per API audience).
    # ms-teams:
    #   name: Microsoft Teams
    #   domains: ["teams.cloud.microsoft"]
    #   entryUrl: https://teams.cloud.microsoft/v2/
    #   strategy: oauth2
    #   config:
    #     audiences: ["https://ic3.teams.office.com"]
    #
    # ms-graph:
    #   domains: ["graph.microsoft.com"]
    #   entryUrl: https://teams.cloud.microsoft/v2/
    #   strategy: oauth2
    #   config:
    #     audiences: ["https://graph.microsoft.com"]

    # Basic authentication (username + password)
    # legacy-api:
    #   name: Legacy Internal API
    #   domains: ["api.internal.corp"]
    #   strategy: basic

    # Cookie auth with localStorage extraction (e.g. Slack xoxc token)
    # IMPORTANT: entryUrl must point to a specific workspace (e.g. /client/<TEAM_ID>),
    # NOT the root URL. The root URL shows a workspace picker where localStorage
    # is not yet populated.
    # slack:
    #   name: Slack
    #   domains: ["app.slack.com", "edgeapi.slack.com"]
    #   entryUrl: https://app.slack.com/client/<TEAM_ID>
    #   strategy: cookie
    #   config:
    #     ttl: "7d"
    #     requiredCookies: ["d"]             # xoxd cookie
    #   localStorage:
    #     - name: token                      # output key in `sig get` JSON
    #       key: localConfig_v2              # localStorage key to read
    #       jsonPath: teams.<TEAM_ID>.token    # dot-path into parsed JSON value

    # Native CDP login mode — for sites that block Playwright automation (X, Reddit)
    # Uses the real browser with no automation markers. Cascade: headless → CDP → visible.
    # twitter:
    #   domains: ["x.com", "twitter.com"]
    #   entryUrl: https://x.com/i/flow/login
    #   strategy: cookie
    #   loginMode: cdp                           # Skip headless, use native browser CDP directly
    #   networkProxy: socks5://127.0.0.1:1080    # Passed as --proxy-server to browser
    #   config:
    #     requiredCookies: ["ct0", "auth_token"]
