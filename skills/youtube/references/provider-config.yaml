# sigcli provider config for YouTube
# Add to ~/.sig/config.yaml under `providers:`
#
# Prerequisites:
#   npm install -g @sigcli/cli
#   sig init
#
# Login:
#   sig login youtube

youtube:
    domains:
        - www.youtube.com
        - youtube.com
    entryUrl: https://www.youtube.com/
    validateUrl: https://www.youtube.com/account
    strategy: browser
    ttl: 2h
    extract:
        - from: cookies
          as: cookie
          match: '*'
    apply:
        - in: header
          name: Cookie
          value: ${cookie}
